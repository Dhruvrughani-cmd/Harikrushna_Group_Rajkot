name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Get dependencies
        run: flutter pub get

      - name: Recreate Android files
        # નામમાં કેપિટલ અક્ષરોને કારણે આવતી એરર આનાથી સોલ્વ થઈ જશે
        run: flutter create . --project-name=harikrushna_group_rajkot --platforms android

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hotel-app-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
