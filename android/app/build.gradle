plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    // ફાયરબેઝ માટે આ લાઈન જરૂરી છે
    id "com.google.gms.google-services"
}

android {
    namespace "com.harikrushna.group"
    compileSdk 34

    defaultConfig {
        applicationId "com.harikrushna.group"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

dependencies {
    // ફાયરબેઝ લાઇબ્રેરી કનેક્ટ કરવા માટે
    implementation platform('com.google.firebase:firebase-bom:32.8.0')
    implementation 'com.google.firebase:firebase-analytics'
}
